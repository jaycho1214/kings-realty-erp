<!doctype html><meta charset="utf-8">
<style>
  body{font-family:system-ui;background:#fff;margin:0;padding:36px}
  :root{--border:oklch(0.917 0.004 258);--brand:oklch(0.55 0.17 277);
    --muted:oklch(0.52 0.011 262);--ink:oklch(0.24 0.012 262);--brand-weak:oklch(0.966 0.022 277)}
  /* mirrors: TabsList h-9 items-stretch gap-0 overflow-x-auto p-0 (no list border) */
  .list{display:flex;align-items:stretch;gap:0;height:36px;overflow-x:auto;padding:0;width:600px}
  /* mirrors trigger: border-0 border-b-2 border-border, active border-b-brand */
  .tab{flex:none;display:inline-flex;align-items:center;gap:6px;height:100%;box-sizing:border-box;
    padding:0 12px;font-size:13px;font-weight:500;color:var(--muted);background:transparent;
    border:0;border-bottom:2px solid var(--border);cursor:pointer}
  .tab.active{color:var(--ink);font-weight:600;border-bottom-color:var(--brand)}
  .pill{font-family:ui-monospace,monospace;font-size:11px;padding:1px 5px;border-radius:6px;background:oklch(0.964 0.003 255);color:var(--muted)}
  .tab.active .pill{background:var(--brand-weak);color:var(--brand)}
</style>
<div class="list">
  <button class="tab active">기본 정보</button>
  <button class="tab">가족 구성원<span class="pill">3</span></button>
  <button class="tab">반려동물<span class="pill">1</span></button>
  <button class="tab">메모<span class="pill">2</span></button>
  <button class="tab">문서<span class="pill">4</span></button>
  <button class="tab">임대 계약<span class="pill">2</span></button>
  <button class="tab">납부 내역<span class="pill">12</span></button>
</div>
