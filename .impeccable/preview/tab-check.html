<!doctype html><meta charset="utf-8">
<style>
  body{font-family:system-ui;background:#fff;margin:0;padding:40px}
  :root{--border:oklch(0.917 0.004 258);--brand:oklch(0.55 0.17 277);
    --muted:oklch(0.52 0.011 262);--ink:oklch(0.24 0.012 262);--brand-weak:oklch(0.966 0.022 277)}
  /* mirrors the resulting classes: list h-9 border-b; trigger after at bottom:-1px h:2px */
  .list{display:flex;gap:4px;height:36px;border-bottom:1px solid var(--border);align-items:stretch}
  .tab{position:relative;display:inline-flex;align-items:center;gap:6px;height:calc(100% - 1px);
    padding:0 12px;font-size:13px;font-weight:500;color:var(--muted);background:transparent;border:0;cursor:pointer}
  .tab::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--brand);opacity:0}
  .tab.active{color:var(--ink);font-weight:600}
  .tab.active::after{opacity:1}
  .pill{font-family:ui-monospace,monospace;font-size:11px;padding:1px 5px;border-radius:6px;background:oklch(0.964 0.003 255);color:var(--muted)}
  .tab.active .pill{background:var(--brand-weak);color:var(--brand)}
</style>
<div class="list">
  <button class="tab active">기본 정보<span class="pill" style="display:none"></span></button>
  <button class="tab">가족 구성원<span class="pill">3</span></button>
  <button class="tab">반려동물<span class="pill">1</span></button>
  <button class="tab">메모<span class="pill">2</span></button>
  <button class="tab">납부 내역<span class="pill">12</span></button>
</div>
